server:
  port: 7000

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: restaurant-service
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/api/restaurants,/api/restaurants/**

        - id: menu-service
          uri: lb://MENU-SERVICE
          predicates:
            - Path=/api/menus/,/api/menus/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/,/api/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

